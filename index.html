<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/responsive.css">



</head>

<body>

    <header>
        <div class="header-content max-content">
            <img class="header-logo" src="./assets/images/Logo 02.png" alt="Kleines Logo">



        </div>
    </header>

    <main>

        <div class="main-content">
            <section class="hero">

                <div class="hero-images">
                    <img class="hero-img" src="./assets/images/hero.jpg" alt="Burger und Pommes Bild">
                    <div class="outer-logo-ring">
                        <img class="hero-logo-img" src="./assets/images/hero-urban-bites-logo.png"
                            alt="urban bites logo">
                    </div>

                </div>

                <div class="hero-content">

                    <div class="hero-review-and-title">
                        <div class="review-box">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                class="lucide lucide-star-icon lucide-star">
                                <path
                                    d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />
                            </svg>

                            <p class="average-count">4,3</p>
                            <p class="review-count">(132)</p>
                        </div>

                        <h1><span>Urban</span>Bites</h1>

                    </div>

                    <p class="sub-title">The best fingerfood in town.</p>

                    <div class="order-now">
                        <p>Jetzt Bestellen</p>

                        <svg class="order-chevron-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" class="lucide lucide-chevron-down-icon lucide-chevron-down">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>

                </div>



            </section>

            <section class="categorie-navigation">
                <div class="categorie-content">

                    <img src="./assets/icons/categories/categories.png" alt="Burger Icon">
                    <h2>Kategorien</h2>

                    <nav>
                        <a href="#">Burger</a>
                        <a href="#">Sides</a>
                        <a href="#">Snacks</a>
                        <a href="#">Drinks</a>
                    </nav>
                </div>
            </section>

            <section class="dish-categories">

                <header>
                    <div class="dish-header-content max-content">
                        <img src="./assets/icons/categories/hamburger.png" alt="Burger Icon">
                        <h2>Burger</h2>
                    </div>
                </header>

                <div class="dish-card">
                    <img src="./assets/images/burgers/classic-burger.jpg" alt="Classic Burger Bild">
                    <h3>Burger</h3>
                    <p>Salat, Sauce, Beef, Tomaten, Zwiebel, Bacon</p>

                    <div class="dish-card-footer">
                        <p class="price-text">16,90€</p>
                        <button class="add-btn">Hinzufügen</button>
                    </div>
                </div>

            </section>
        </div>


        <section class="basket-section">

            <div class="basket">

                <div class="basket-svg-bg" id="toggle-basket">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="shopping-icon">
                        <circle cx="8" cy="21" r="1" />
                        <circle cx="19" cy="21" r="1" />
                        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
                    </svg>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="x-icon">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </div>

                <div id="basket-content" class="basket-content">
                    <h3>Deine Bestellung</h3>

                    <div class="isEmpty-content">
                        <p>Dein Warenkorb ist leer.
                            <br> Zeit etwas zu Bestellen.
                        </p>

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-shopping-cart-icon lucide-shopping-cart">
                            <circle cx="8" cy="21" r="1" />
                            <circle cx="19" cy="21" r="1" />
                            <path
                                d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
                        </svg>
                    </div>


                </div>


                <!-- <div class="basket-card">
                    <p>Zwischensumme</p>
                    <p>Lieferkosten</p>
                    <p>Gesamtbetrag</p>
                </div> -->


            </div>

        </section>

    </main>




    </section>

    <footer>
        <div class="footer-content max-content">
            <div class="copyright">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-copyright-icon lucide-copyright copyright-icon">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M14.83 14.83a4 4 0 1 1 0-5.66" />
                </svg>
                <p>Urban Bites</p>
            </div>

            <div class="footer-links">
                <a href="./impressum.html">Imprint</a>
                <a href="#">Cookie Rreferences</a>
            </div>

        </div>
    </footer>


    <script src="./scripts/main.js"></script>
</body>

</html>
